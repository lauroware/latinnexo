<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="LATIN NEXO: Próximamente - Menú QR con diseño único" />
  <meta name="author" content="LATIN NEXO" />
  <title>LATIN NEXO — Próximamente</title>

  <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8f9fc;
    }

    .hero-kicker { 
      letter-spacing: .12em; 
      text-transform: uppercase; 
      font-size: .85rem; 
    }

    .feature-icon {
      width: 3rem;
      height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
    }

    .bg-brand { 
      background: linear-gradient(135deg, #1EADD2 0%, #9D3796 55%, #DC2F88 100%) !important; 
    }

    .text-brand { 
      color: #1EADD2 !important; 
    }

    .border-brand { 
      border-color: #1EADD2 !important; 
    }

    .btn-brand { 
      background: #1EADD2; 
      border-color: #1EADD2; 
    }

    .btn-brand:hover { 
      filter: brightness(1.05); 
      transform: translateY(-2px);
    }

    .btn-outline-brand { 
      color: #1EADD2; 
      border-color: #1EADD2; 
    }

    .btn-outline-brand:hover { 
      background: #1EADD2; 
      color: #fff; 
    }

    .muted { 
      color: rgba(255,255,255,.7); 
    }

    .plan-card {
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 18px;
      padding: 22px;
      height: 100%;
      background: #fff;
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
      overflow: hidden;
    }

    .plan-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(0,0,0,.08);
    }

    .plan-badge {
      position: absolute; 
      top: 16px; 
      right: 16px;
      font-size: .75rem; 
      padding: .35rem .6rem; 
      border-radius: 999px;
      background: rgba(30,173,210,.12);
      color: #0b6f87;
      border: 1px solid rgba(30,173,210,.25);
      font-weight: 700;
    }

    .plan-price {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.1;
      color: #1EADD2;
      margin: 10px 0 4px 0;
    }

    .plan-sub { 
      color: #6c757d; 
      margin-bottom: 14px; 
    }

    .plan-list { 
      padding-left: 1.1rem; 
      margin: 0; 
    }

    .plan-list li { 
      margin-bottom: .35rem; 
    }

    .note-card {
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 18px;
      background: #fff;
    }

    /* Estilos específicos para la página "en construcción" */
    .construction-wrapper {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .construction-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
      padding: 3rem 2rem;
      text-align: center;
      max-width: 650px;
      margin: 0 auto;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .construction-icon {
      font-size: 4.5rem;
      background: linear-gradient(135deg, #1EADD2 0%, #9D3796 55%, #DC2F88 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .main-message {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1EADD2 0%, #9D3796 55%, #DC2F88 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    @media (max-width: 576px) {
      .main-message {
        font-size: 2rem;
      }
      .construction-card {
        padding: 2rem 1.5rem;
      }
    }

    .sub-message {
      color: #4a5568;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .loader-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
    }

    .loader-dots span {
      width: 10px;
      height: 10px;
      background: #1EADD2;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body class="d-flex flex-column h-100">
  <main class="flex-shrink-0">
    
    <!-- Contenido principal: SITIO EN CONSTRUCCIÓN hermoso -->
    <div class="construction-wrapper">
      <div class="construction-card">
        <div class="construction-icon">
          <i class="bi bi-hammer"></i>
        </div>
        <div class="main-message">
          SITIO EN CONSTRUCCIÓN
        </div>
        <p class="sub-message">
          Estamos trabajando para ofrecerte la mejor experiencia en menús digitales con QR.<br>
          Muy pronto encontrarás toda la información sobre nuestros planes y servicios.
        </p>
        <div class="d-flex justify-content-center gap-3 flex-wrap">
          <a href="#" class="btn btn-brand px-4 py-2 rounded-pill">
            <i class="bi bi-envelope-fill me-1"></i> Notificarme
          </a>
          <a href="#" class="btn btn-outline-brand px-4 py-2 rounded-pill">
            <i class="bi bi-instagram"></i> Seguir avances
          </a>
        </div>
        <div class="loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="mt-4 small text-secondary">
          <i class="bi bi-qr-code"></i> LATIN NEXO — Próximamente
        </div>
      </div>
    </div>

  </main>

  <!-- Footer (exactamente igual al que tenías) -->
  <footer class="bg-dark py-4 mt-auto">
    <div class="container px-5">
      <div class="row align-items-center justify-content-between flex-column flex-sm-row">
        <div class="col-auto">
          <div class="small m-0 text-white">
            &copy; Lauro Ware 2026 <span id="year"></span>
          </div>
        </div>
        <div class="col-auto">
          <a class="link-light small" href="#">Servicios</a>
          <span class="text-white mx-1">&middot;</span>
          <a class="link-light small" href="#">Contacto</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
